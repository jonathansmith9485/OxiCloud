---
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oxicloud.fullname" . }}-secret
  labels:
    {{- include "oxicloud.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.jwtSecret }}
  OXICLOUD_JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.wopi.enabled }}
  {{- $secretName := printf "%s-secret" (include "oxicloud.fullname" .) }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
  {{- if and $existingSecret (hasKey $existingSecret.data "WOPI_ADMIN_PASSWORD") }}
  WOPI_ADMIN_PASSWORD: {{ index $existingSecret.data "WOPI_ADMIN_PASSWORD" | quote }}
  {{- else }}
  WOPI_ADMIN_PASSWORD: {{ .Values.wopi.collabora.admin.password | default (randAlphaNum 20) | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
